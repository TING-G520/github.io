---
layout: default
---
<h1>歡迎來到香港補習中介平台</h1>
<p>搜尋香港優質補習老師，按科目、地區、價格過濾，或輸入關鍵字搜尋。</p>

<div id="search-bar">
  <label>關鍵字搜尋：</label>
  <input type="text" id="keyword-search" placeholder="輸入姓名、科目或地區...">
  <button onclick="filterTutors()">搜尋</button>
</div>

<div id="filters">
  <label>科目：</label>
  <select id="subject-filter">
    <option value="">全部</option>
    <option value="數學">數學</option>
    <option value="英文">英文</option>
    <option value="中文">中文</option>
    <option value="物理">物理</option>
    <option value="音樂">音樂</option>  <!-- 加 Tutorhabit 常見科目 -->
    <option value="運動">運動</option>
  </select>

  <label>地區：</label>
  <select id="area-filter">
    <option value="">全部</option>
    <option value="沙田">沙田</option>
    <option value="尖沙咀">尖沙咀</option>
    <option value="中環">中環</option>
    <option value="九龍塘">九龍塘</option>
    <option value="旺角">旺角</option>  <!-- 加香港常見地區 -->
  </select>

  <label>價格（每小時）：</label>
  <select id="price-filter">
    <option value="">全部</option>
    <option value="low">低於 $200</option>
    <option value="medium">$200 - $400</option>
    <option value="high">高於 $400</option>
  </select>
</div>

<div id="tutor-list">
  {% for tutor in site.data.tutors %}
  <div class="tutor-card" data-subject="{{ tutor.subject }}" data-area="{{ tutor.area }}" data-price="{{ tutor.price }}" data-keywords="{{ tutor.name | downcase }} {{ tutor.subject | downcase }} {{ tutor.area | downcase }}">
    <h3>{{ tutor.name }}</h3>
    <p>科目：{{ tutor.subject }}</p>
    <p>地區：{{ tutor.area }}</p>
    <p>價格：${{ tutor.price }} / 小時</p>
    <p>簡介：{{ tutor.bio }}</p>
    <a href="/tutor/{{ tutor.name | slugify }}">查看詳情</a>  <!-- 連結到個人頁 -->
  </div>
  {% endfor %}
</div>
